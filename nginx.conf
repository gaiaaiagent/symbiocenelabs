# Nginx configuration for Gaia AI website
# This file should be included in the server block of your main nginx.conf

# Serve static files
location / {
    root /var/www/symbiocenelabs;
    index index.html;
    try_files $uri $uri/ =404;
}

# API endpoint for email subscriptions
location /api/subscribe {
    proxy_pass http://localhost:3001/api/subscribe;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_cache_bypass $http_upgrade;
}

# Enable gzip compression
gzip on;
gzip_comp_level 5;
gzip_min_length 256;
gzip_proxied any;
gzip_vary on;
gzip_types
  application/javascript
  application/json
  application/x-javascript
  text/css
  text/javascript
  text/plain
  text/xml;
